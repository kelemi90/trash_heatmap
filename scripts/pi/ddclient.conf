## ddclient configuration example
## Edit login and password/token for your dy.fi account if the provider supports DynDNS.
daemon=300
syslog=yes
mail=root
pid=/var/run/ddclient.pid
protocol=dyndns2
use=web, web=checkip.dyndns.com/
server=dy.fi
login=YOUR_DYFI_LOGIN_OR_EMAIL
password='YOUR_DYFI_PASSWORD_OR_TOKEN'
tyhjennys.dy.fi

# If dy.fi uses a custom URL or API, you may prefer the curl-based script instead.
