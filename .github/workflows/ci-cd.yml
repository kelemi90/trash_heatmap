name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test

  deploy:
    name: Deploy to Pi
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # Start ssh-agent with the private key stored in repo secrets
      - name: Setup SSH key and agent (manual)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # start ssh-agent and add the key
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa

      - name: Ensure known_hosts (optional)
        run: |
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync files to server
        run: |
          rsync -avz --delete --exclude='.git' \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Remote deploy (install deps & restart)
        env:
          NODE_ENV: production
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} <<'SSH'
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            # optional: create backups dir
            mkdir -p database/backups
            npm ci --production
            # Restart with pm2 using ecosystem file (create if needed)
            if [ -f ecosystem.config.js ]; then
              pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
            else
              pm2 restart server/server.js || pm2 start server/server.js --name trash_heatmap --watch
            fi
            # basic healthcheck
            sleep 2
            curl -fsS http://localhost:3001/ || (echo 'healthcheck failed' && exit 1)
            exit 0
          SSH