<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trash Heatmap Admin</title>

<link rel="stylesheet" href="/css/style.css">

<style>
body{
font-family:Arial;
margin:40px;
background:#f5f5f5;
}
h1{
margin-bottom:10px;
}
.panel{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}
button{
padding:8px 12px;
margin-left:10px;
}
input{
padding:8px;
}
.user{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div id="navbar"></div>

<script>

fetch("/components/navbar.html")
.then(r=>r.text())
.then(html=>{
document.getElementById("navbar").innerHTML = html
if(window.markActiveNav) window.markActiveNav()
else setTimeout(()=>{ if(window.markActiveNav) window.markActiveNav() },200)
    if(window.adjustNavbarAuth) window.adjustNavbarAuth()
    else setTimeout(()=>{ if(window.adjustNavbarAuth) window.adjustNavbarAuth() },200)
})

</script>

<script src="/js/site.js"></script>

<h1>Admin - Trash Heatmap</h1>

<div class="panel">
<h2>Add User</h2>
<input id="username" placeholder="username">
<button onclick="addUser()">Add</button>
<button onclick="logout()">Logout</button>
</div>

<div class="panel">
<h2>Workers</h2>
<div id="users"></div>
</div>

<script>

/* LOGIN OPTION */

async function checkLogin(){

const res = await fetch("/api/admin/check",{
credentials:"same-origin"
})

const data = await res.json()

if(!data.logged){
window.location="/admin_login.html"
return false
}

return true

}

/* LOAD USERS */

async function loadUsers(){

const res = await fetch("/api/users",{
cache:"no-store",
credentials:"same-origin"
})

const users = await res.json()

const container = document.getElementById("users")
container.innerHTML=""
users.forEach(u=>{

const div=document.createElement("div")
div.className="user"

div.innerHTML=`
<span>${u.username}</span>
<button onclick="deleteUser(${u.id})">Delete</button>
`

container.appendChild(div)

})

}

/* ADD USERS */

async function addUser(){
    const username=document.getElementById("username").value.trim()
    if(!username){
        alert("Enter username")
        return
    }

    const res = await fetch("/api/users",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        credential:"same-origin",
        body:JSON.stringify({username})
    })

    const data = await res.json()

    if(data.success){
        document.getElementById("username").value=""
        await loadUsers() 
    }else{
        alert("User exists")
    }

}

/* DELETE USER */

async function deleteUser(id){

if(!confirm("Delete user?")) return

await fetch("/api/users/"+id,{
method:"DELETE",
credentials:"same-origin"
})

loadUsers()

}

/* START PAGE */

(async () => {
    await checkLogin()
    await loadUsers()
})()

async function logout(){

await fetch("/api/admin/logout",{
method:"POST",
credentials:"same-origin"
})

// after logout send user to dashboard view
window.location="/dashboard.html"

}

</script>

</body>
</html>
