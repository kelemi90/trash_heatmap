<!DOCTYPE html>
<html>
<head>

<title>Trash Control Dashboard</title>

<link rel="stylesheet" href="/css/style.css">

<script src="/js/map.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heatmapjs"></script>

<style>

#layout{
display:flex;
gap:30px;
}

#left{
flex:2;
}

#right{
flex:1;
}

#activity{
height:300px;
overflow:auto;
border:1px solid #ccc;
padding:10px;
}

#ranking{
border:1px solid #ccc;
padding:10px;
margin-top:20px;
}

.map-container{
position:relative;
	/* keep the map away from the page edge */
	margin-left:16px;
}

.map-container img{
	display:block;
	width:100%;
	height:auto;
	position:relative;
	z-index:1;
}

/* leave padding on left side for smaller screens */
@media (max-width: 900px){
  #layout{ padding-left: 16px; padding-right:16px }
}

.marker{
position:absolute;
width:14px;
height:14px;
border-radius:50%;
transform:translate(-50%,-50%);
}

.hover-label{
	background: rgba(0,0,0,0.75);
	color: #fff;
	padding: 3px 6px;
	border-radius: 4px;
	font-size: 12px;
	pointer-events: none;
}

.green{ background:#2ecc71 }
.orange{ background:#f39c12 }
.red{ background:#e74c3c }

</style>

</head>

<body>

<div id="navbar"></div>
<div id="tooltip" style="position:absolute;display:none;pointer-events:none;padding:6px 8px;background:rgba(0,0,0,0.85);color:#fff;border-radius:4px;font-size:13px;z-index:1000"></div>

<h1>Event Trash Control Dashboard</h1>

<div id="layout">

<div id="left">

<div class="map-container" id="map">

<img src="/map/pohjakartta.png" style="width:100%" draggable="false">

<div id="heatLayer"
style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:auto;z-index:2">
</div>

<!-- marker layer sits above heatmap so markers are visible and interactive -->
<div id="markerLayer" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:3;pointer-events:auto"></div>

</div>

</div>

<div id="right">

<h3>Worker Activity</h3>
<div id="activity"></div>

<h3>Top Used Bins</h3>
<div id="ranking"></div>

</div>

</div>

<script src="/js/dashboard.js"></script>

</body>
</html>
