<h2>Bin Usage Ranking</h2>

<table id="table"></table>

<script>

fetch("/api/ranking")
.then(r=>r.json())
.then(data=>{
const t = document.getElementById("table")

data.forEach(row=>{

let tr = document.createElement("tr")

tr.innerHTML = `
<td>Bin ${row.bin_id}</td>
<td>${row.total}</td>
`

t.appendChild(tr)

})

})

</script>
