<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Scan Trash Bin</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f2f4f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
width:90%;
max-width:450px;
text-align:center;
}

#reader{
margin-top:15px;
}

</style>

</head>

<body>

<div class="card">

<h1>Scan Trash Bin</h1>

<div id="reader"></div>

<p>Point camera at bin QR code</p>

</div>

<script>

let html5QrCode = new Html5Qrcode("reader")

function startScanner(){

Html5Qrcode.getCameras().then(devices=>{

if(!devices.length){
alert("No camera found")
return
}

let cameraId = devices[0].id

devices.forEach(d=>{
if(d.label.toLowerCase().includes("back"))
cameraId = d.id
})

html5QrCode.start(
cameraId,
{
fps:10,
qrbox:{width:250,height:250}
},
onScanSuccess
)

})

}

function onScanSuccess(decodedText){

let binId = null

if(decodedText.startsWith("bin:")){
binId = decodedText.split(":")[1]
}

if(decodedText.includes("bin=")){
try{
const url = new URL(decodedText)
binId = url.searchParams.get("bin")
}catch(e){}
}

if(binId){

/* vibration */
if(navigator.vibrate){
navigator.vibrate(200)
}

/* beep */
const beep = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg")
beep.play()

html5QrCode.stop()

setTimeout(()=>{
window.location.href="/bin.html?bin="+binId
},400)

}

}

/* start automatically */

startScanner()

</script>

</body>
</html>
