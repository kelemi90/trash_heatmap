<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Scan Trash Bin</title>

        <meta name="viewport" content="width=device-width, initial-scale=1">

        <script src="https://unpkg.com/html5-qrcode"></script>

        <style>
            body{
                font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
                background:#f2f4f8;
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
                margin:0;
            }

            .card{
                background:white;
                padding:20px;
                border-radius:16px;
                box-shadow:0 10px 30px rgba(0,0,0,0.15);
                width:90%;
                max-width:450px;
                text-align:center;
            }

            h1{
                margin-top:0;
            }

            #reader{
                margin-top:15px;
            }

        </style>
    </head>

    <body>

        <div class="card">

            <h1>Scan Trash Bin</h1>

            <button onclick="startScanner()" id="startBtn">
            Start Scanner
            </button>

            <div id="reader"></div>

        </div>

        <script>
            const html5QrCode = new Html5qrcode("reader")

            function startScanner(){
                document.getElementById("startBtn").style.display="none"
                Html5Qrcode.getCameras().then(devices => {
                    if(!devices.length){
                        alert("No camera found")
                        return
                    }

                    html5QrCode.start(
                        devices[0].id,
                        {
                            fps:10,
                            qrbox:250
                        },
                        onScanSuccess
                    )

                }).catch(err=>{
                    console.log(err)
                    alert("Camera error")
                })
            }
            function onScanSuccess(decodeText){
                let binId=null

                if(decodedText.startsWith("bin:")){
                    binId=decodedText.split(":")[1]
                }

                if(decodedText.includes("bin=")){
                    const url=new URL(decodedText)
                    binId=url.searchParams.get("bin")
                }

                if(binId){
                    html5QrCode.stop()
                    window.location.href="/bin.html?bin="+binId
                }
            }
        </script>
    </body>
</html>
