<!DOCTYPE html>
<html>

<head>

<title>Bin Editor</title>

<link rel="stylesheet" href="/css/style.css">

<script src="/js/map.js"></script>

<style>

#layout{
display:flex;
gap:20px;
}

#sidebar{
width:250px;
background:white;
border:1px solid #ddd;
padding:10px;
height:600px;
overflow:auto;
}

#binList div{
padding:4px;
border-bottom:1px solid #eee;
font-size:13px;
}

#bulkActions{
display:flex;
flex-direction:column;
gap:8px;
margin-bottom:10px;
}

#bulkActions button{
padding:6px 8px;
}

#selectionInfo{
font-size:12px;
color:#555;
}

.bin-row{
display:flex;
align-items:center;
gap:6px;
}

.bin-row label{
cursor:pointer;
}

.map-container{
position:relative;
}

.map-container img{
width:100%;
display:block;
}

.marker{
position:absolute;
width:22px;
height:22px;
border-radius:50%;
background:red;
color:white;
font-size:11px;
display:flex;
align-items:center;
justify-content:center;
transform:translate(-50%,-50%);
cursor:pointer;
user-select:none;
}

.marker.selected{
background:#0057a8;
box-shadow:0 0 0 2px rgba(255,255,255,0.9), 0 0 0 4px rgba(0,87,168,0.45);
}

</style>

</head>

<body>

<div id="navbar"></div>

<script>
fetch("/components/navbar.html")
.then(r=>r.text())
.then(html=>{
document.getElementById("navbar").innerHTML = html
if(window.markActiveNav) window.markActiveNav()
else setTimeout(()=>{ if(window.markActiveNav) window.markActiveNav() },200)
	if(window.adjustNavbarAuth) window.adjustNavbarAuth()
	else setTimeout(()=>{ if(window.adjustNavbarAuth) window.adjustNavbarAuth() },200)
})
</script>

<script src="/js/site.js"></script>

<h2>Drag Trash Bins To Correct Locations</h2>

<div id="layout">

<div id="sidebar">
<h3>Bin Coordinates</h3>
<div id="bulkActions">
<button id="selectAllBtn">Select All Bins</button>
<button id="resetSelectedBtn" disabled>Return Selected To X:0 Y:0</button>
<button id="clearSelectionBtn" disabled>Clear Selection</button>
<div id="selectionInfo">0 bins selected</div>
</div>
<div id="binList"></div>
</div>

<div class="map-container" id="map">
<img src="/map/pohjakartta.png">
</div>

</div>

<script>

const map = document.getElementById("map")
const binList = document.getElementById("binList")
const selectAllBtn = document.getElementById("selectAllBtn")
const resetSelectedBtn = document.getElementById("resetSelectedBtn")
const clearSelectionBtn = document.getElementById("clearSelectionBtn")
const selectionInfo = document.getElementById("selectionInfo")

let dragging = null
let bins = []
const selectedBins = new Set()

const STAGING_COLUMNS = 10
const STAGING_MARKER_SIZE = 22
const STAGING_GAP = 4

function clearEditorMarkers(){
document.querySelectorAll("#map .marker").forEach(m=>m.remove())
}

// Backward-compatible alias for older scripts that still call mgt.clearMarks().
if(!window.mgt) window.mgt = {}
if(typeof window.mgt.clearMarks !== "function"){
window.mgt.clearMarks = clearEditorMarkers
}

/* LOAD BINS */

fetch("/api/bins")
.then(r=>r.json())
.then(data=>{
bins = data.sort((a,b)=>a.id - b.id)
renderAllMarkers()
updateList()
})

/* CREATE MARKER */

function createMarker(bin){

let marker = document.createElement("div")
marker.className="marker"
marker.innerText = bin.id

let x,y

if(!isStagedBin(bin)){

const screen = mapToScreen(bin.x,bin.y,map)
x = screen.x
y = screen.y

}else{

const slot = getStagingSlot(bin.id)

x = slot.col * (STAGING_MARKER_SIZE + STAGING_GAP) + STAGING_MARKER_SIZE
y = slot.row * (STAGING_MARKER_SIZE + STAGING_GAP) + STAGING_MARKER_SIZE

}

marker.style.left = x+"px"
marker.style.top = y+"px"

marker.dataset.id = bin.id
if(selectedBins.has(bin.id)) marker.classList.add("selected")

marker.addEventListener("mousedown", startDrag)

/* RIGHT CLICK DELETE */

marker.addEventListener("contextmenu",e=>{
e.preventDefault()

if(!confirm("Delete bin?")) return

fetch("/api/bin/delete",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id:bin.id})
})

marker.remove()

bins = bins.filter(b=>b.id != bin.id)
selectedBins.delete(bin.id)

renderAllMarkers()
updateList()
})

map.appendChild(marker)

}

function isStagedBin(bin){
const hasCoords = bin.x !== null && bin.x !== undefined && bin.y !== null && bin.y !== undefined
if(!hasCoords) return true
return Number(bin.x) === 0 && Number(bin.y) === 0
}

function getStagingSlot(binId){
const stagedIds = bins
.filter(isStagedBin)
.map(b=>b.id)
.sort((a,b)=>a-b)

const index = Math.max(0, stagedIds.indexOf(binId))
const col = index % STAGING_COLUMNS
const row = Math.floor(index / STAGING_COLUMNS)
return {col,row}
}

function renderAllMarkers(){
clearEditorMarkers()
bins.forEach(b=>createMarker(b))
}

function updateSelectionUi(){

const count = selectedBins.size

selectionInfo.innerText = count+" bins selected"
resetSelectedBtn.disabled = count === 0
clearSelectionBtn.disabled = count === 0

document.querySelectorAll(".marker").forEach(marker=>{
const markerId = Number(marker.dataset.id)
marker.classList.toggle("selected", selectedBins.has(markerId))
})

}

async function resetSelectedBins(){

if(selectedBins.size === 0) return

if(!confirm("Return selected bins to x:0, y:0 staging rows?")) return

const selectedIds = Array.from(selectedBins)

try{

await Promise.all(selectedIds.map(id=>
fetch("/api/bin/update",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({id,x:0,y:0})
})
))

selectedIds.forEach(id=>{
const bin = bins.find(b=>b.id === id)
if(bin){
bin.x = 0
bin.y = 0
}
})

selectedBins.clear()
renderAllMarkers()
updateList()

}catch(err){
alert("Failed to reset selected bins")
}

}

/* DRAGGING */

function startDrag(e){

dragging = e.target

document.addEventListener("mousemove",drag)
document.addEventListener("mouseup",stopDrag)

}

function drag(e){

if(!dragging) return

const rect = map.getBoundingClientRect()

let x = e.clientX - rect.left
let y = e.clientY - rect.top

dragging.style.left = x+"px"
dragging.style.top = y+"px"

}

function stopDrag(e){

if(!dragging) return

const rect = map.getBoundingClientRect()

const screenX = e.clientX - rect.left
const screenY = e.clientY - rect.top

const pos = screenToMap(screenX,screenY,map)

const id = dragging.dataset.id

fetch("/api/bin/update",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
id:id,
x:pos.x,
y:pos.y
})
})

let bin = bins.find(b=>b.id == id)
if(bin){
bin.x = pos.x
bin.y = pos.y
}

renderAllMarkers()
updateList()

dragging = null

document.removeEventListener("mousemove",drag)
document.removeEventListener("mouseup",stopDrag)

}

/* CLICK MAP = CREATE BIN */

map.addEventListener("click",e=>{

if(e.target.classList.contains("marker")) return

const rect = map.getBoundingClientRect()

const screenX = e.clientX - rect.left
const screenY = e.clientY - rect.top

const pos = screenToMap(screenX,screenY,map)

fetch("/api/bin/add",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
x:pos.x,
y:pos.y
})
})
.then(r=>r.json())
.then(newBin=>{

bins.push(newBin)

renderAllMarkers()
updateList()

})

})

/* UPDATE LEFT PANEL */

function updateList(){

binList.innerHTML=""

bins
.sort((a,b)=>a.id - b.id)
.forEach(b=>{

let row=document.createElement("div")

row.className = "bin-row"

const checkbox = document.createElement("input")
checkbox.type = "checkbox"
checkbox.checked = selectedBins.has(b.id)
checkbox.addEventListener("change",()=>{
if(checkbox.checked) selectedBins.add(b.id)
else selectedBins.delete(b.id)
updateSelectionUi()
})

const label = document.createElement("label")
label.innerText =
"Bin "+b.id+
" | X:"+Number(b.x).toFixed(2)+
" Y:"+Number(b.y).toFixed(2)

row.appendChild(checkbox)
row.appendChild(label)

binList.appendChild(row)

})

updateSelectionUi()

}

resetSelectedBtn.addEventListener("click",resetSelectedBins)
selectAllBtn.addEventListener("click",()=>{
bins.forEach(b=>selectedBins.add(b.id))
updateList()
})
clearSelectionBtn.addEventListener("click",()=>{
selectedBins.clear()
updateList()
})

</script>

</body>
</html>
