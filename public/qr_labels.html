<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>QR Label Generator</title>

<link rel="stylesheet" href="/css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial, sans-serif;
margin:30px;
background:#f5f5f5;
}

h1{
margin-bottom:10px;
}

.controls{
margin-bottom:25px;
}

button{
padding:10px 18px;
font-size:16px;
margin-right:10px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.label{

background:white;
border:1px dashed #bbb;
border-radius:10px;

padding:15px;
text-align:center;
box-sizing:border-box;

}

.label img{
width:160px;
height:160px;
}

.bin{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.code{
font-size:14px;
color:#666;
margin-top:4px;
}

.scan{
font-size:13px;
margin-top:6px;
color:#444;
}

#status{
margin-top:10px;
color:#666;
}

/* Print optimization */

@page{
margin:5mm;
}

@media print{

body{
background:white;
margin:0;
padding:0;
}

.controls{
display:none;
}

#navbar{
display:none;
}

h1{
display:none;
}

#status{
display:none;
}

/* --- grid/sheet mode (default) --- */
.grid{
display:flex;
flex-wrap:wrap;
gap:0;
}

.label{
width:6cm;
height:6cm;
border:0.5px dashed #aaa;
border-radius:0;
padding:3mm;
box-sizing:border-box;
page-break-inside:avoid;
break-inside:avoid;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.label img{
width:4.4cm;
height:4.4cm;
}

.bin{
font-size:12pt;
font-weight:bold;
margin-top:1.5mm;
}

.code{
font-size:7pt;
color:#666;
margin-top:0.5mm;
}

.scan{
font-size:7pt;
margin-top:0.5mm;
color:#444;
}

}

</style>

</head>

<body>

    <div id="navbar"></div>

<script>

fetch("/components/navbar.html")
.then(r=>r.text())
.then(html=>{
document.getElementById("navbar").innerHTML = html
if(window.markActiveNav) window.markActiveNav()
else setTimeout(()=>{ if(window.markActiveNav) window.markActiveNav() },200)
    if(window.adjustNavbarAuth) window.adjustNavbarAuth()
    else setTimeout(()=>{ if(window.adjustNavbarAuth) window.adjustNavbarAuth() },200)
})

</script>

<script src="/js/site.js"></script>

<h1>QR Label Generator</h1>

<div class="controls">

<button onclick="generate()">Generate All 55</button>

<button onclick="window.print()">Print (Sheet)</button>

<button onclick="printStrip()">Print (Strip / Thermal)</button>

<button onclick="downloadPDF()">Download PDF (Thermal)</button>

<span id="status"></span>

</div>

<div id="labels" class="grid"></div>

<script>

async function generate(){

const container = document.getElementById("labels")
const status = document.getElementById("status")

container.innerHTML=""
status.innerText="Generating QR labels..."

try{

/* generate all QR codes in parallel for speed */

const requests=[]

for(let i=1;i<=55;i++){
requests.push(fetch("/api/qr/"+i).then(r=>r.json()))
}

const results = await Promise.all(requests)

results.forEach((data,index)=>{

const bin=index+1

const div=document.createElement("div")
div.className="label"

div.innerHTML=`
<img src="${data.qr}">
<div class="bin">BIN ${bin}</div>
<div class="code">Code: B${bin}</div>
<div class="scan">Scan when emptied</div>
`

container.appendChild(div)

})

status.innerText="QR labels ready"

}catch(err){

status.innerText="Error generating QR codes"
console.error(err)

}

}

async function downloadPDF(){
const labels = document.getElementById('labels')
if(!labels || !labels.children.length){
alert('Generate labels first')
return
}
const status = document.getElementById('status')
status.innerText = 'Building PDF...'

try{
const { jsPDF } = window.jspdf
// 60mm x 60mm pages, no margin
const doc = new jsPDF({ unit:'mm', format:[60,60], orientation:'portrait' })

const items = Array.from(labels.querySelectorAll('.label'))
for(let i=0;i<items.length;i++){
if(i > 0) doc.addPage([60,60],'portrait')
const img = items[i].querySelector('img')
const binEl = items[i].querySelector('.bin')
const scanEl = items[i].querySelector('.scan')
// QR image: 44mm x 44mm, centred horizontally, 3mm from top
doc.addImage(img.src, 'PNG', 8, 3, 44, 44)
// Bin label
doc.setFontSize(12)
doc.setFont('helvetica','bold')
const binText = binEl ? binEl.innerText : ''
doc.text(binText, 30, 50, {align:'center'})
// Scan text
doc.setFontSize(7)
doc.setFont('helvetica','normal')
const scanText = scanEl ? scanEl.innerText : ''
doc.text(scanText, 30, 55, {align:'center'})
}

doc.save('qr-labels-60mm.pdf')
status.innerText = 'PDF downloaded — open it and print at actual size'
}catch(err){
status.innerText = 'PDF generation failed'
console.error(err)
}
}

function printStrip(){
const labels = document.getElementById('labels')
if(!labels || !labels.children.length){
alert('Generate labels first')
return
}

const items = Array.from(labels.querySelectorAll('.label'))
const html = items.map(el => `<div class="label">${el.innerHTML}</div>`).join('')

const w = window.open('', '_blank', 'width=400,height=600')
w.document.write(`<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@page{
  size: 60mm 60mm;
  margin: 0;
}
html, body{
  width: 60mm;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: white;
}
*{ box-sizing: border-box; }
.label{
  width: 60mm;
  height: 60mm;
  padding: 3mm;
  page-break-after: always;
  break-after: page;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.label:last-child{ page-break-after: avoid; break-after: avoid; }
.label img{ width: 44mm; height: 44mm; }
.bin{ font-size: 12pt; font-weight: bold; margin-top: 1.5mm; }
.code{ font-size: 7pt; color: #666; margin-top: 0.5mm; }
.scan{ font-size: 7pt; color: #444; margin-top: 0.5mm; }
</style></head><body>
${html}
<script>
var imgs = document.images;
var total = imgs.length;
if(total === 0){ window.print(); }
else {
  var loaded = 0;
  function onImg(){ loaded++; if(loaded >= total) window.print(); }
  for(var i=0;i<total;i++){
    if(imgs[i].complete) onImg();
    else { imgs[i].onload = onImg; imgs[i].onerror = onImg; }
  }
}
<\/script>
</body></html>`)
w.document.close()
}

</script>

</body>
</html>
