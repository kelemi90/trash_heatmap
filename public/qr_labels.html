<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>QR Label Generator</title>

<link rel="stylesheet" href="/css/style.css">

<style>

body{
font-family:Arial, sans-serif;
margin:30px;
background:#f5f5f5;
}

h1{
margin-bottom:10px;
}

.controls{
margin-bottom:25px;
}

button{
padding:10px 18px;
font-size:16px;
margin-right:10px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.label{

background:white;
border:1px dashed #bbb;
border-radius:10px;

padding:15px;
text-align:center;
box-sizing:border-box;

}

.label img{
width:160px;
height:160px;
}

.bin{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.code{
font-size:14px;
color:#666;
margin-top:4px;
}

.scan{
font-size:13px;
margin-top:6px;
color:#444;
}

#status{
margin-top:10px;
color:#666;
}

/* Print optimization */

@page{
margin:5mm;
}

@media print{

body{
background:white;
margin:0;
padding:0;
}

.controls{
display:none;
}

#navbar{
display:none;
}

h1{
display:none;
}

#status{
display:none;
}

/* --- grid/sheet mode (default) --- */
.grid{
display:flex;
flex-wrap:wrap;
gap:0;
}

.label{
width:6cm;
height:6cm;
border:0.5px dashed #aaa;
border-radius:0;
padding:3mm;
box-sizing:border-box;
page-break-inside:avoid;
break-inside:avoid;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.label img{
width:4.4cm;
height:4.4cm;
}

.bin{
font-size:12pt;
font-weight:bold;
margin-top:1.5mm;
}

.code{
font-size:7pt;
color:#666;
margin-top:0.5mm;
}

.scan{
font-size:7pt;
margin-top:0.5mm;
color:#444;
}

}

</style>

</head>

<body>

    <div id="navbar"></div>

<script>

fetch("/components/navbar.html")
.then(r=>r.text())
.then(html=>{
document.getElementById("navbar").innerHTML = html
if(window.markActiveNav) window.markActiveNav()
else setTimeout(()=>{ if(window.markActiveNav) window.markActiveNav() },200)
    if(window.adjustNavbarAuth) window.adjustNavbarAuth()
    else setTimeout(()=>{ if(window.adjustNavbarAuth) window.adjustNavbarAuth() },200)
})

</script>

<script src="/js/site.js"></script>

<h1>QR Label Generator</h1>

<div class="controls">

<button onclick="generate()">Generate All 55</button>

<button onclick="window.print()">Print (Sheet)</button>

<button onclick="printStrip()">Print (Strip / Thermal)</button>

<span id="status"></span>

</div>

<div id="labels" class="grid"></div>

<script>

async function generate(){

const container = document.getElementById("labels")
const status = document.getElementById("status")

container.innerHTML=""
status.innerText="Generating QR labels..."

try{

/* generate all QR codes in parallel for speed */

const requests=[]

for(let i=1;i<=55;i++){
requests.push(fetch("/api/qr/"+i).then(r=>r.json()))
}

const results = await Promise.all(requests)

results.forEach((data,index)=>{

const bin=index+1

const div=document.createElement("div")
div.className="label"

div.innerHTML=`
<img src="${data.qr}">
<div class="bin">BIN ${bin}</div>
<div class="code">Code: B${bin}</div>
<div class="scan">Scan when emptied</div>
`

container.appendChild(div)

})

status.innerText="QR labels ready"

}catch(err){

status.innerText="Error generating QR codes"
console.error(err)

}

}

function printStrip(){
const labels = document.getElementById('labels')
if(!labels || !labels.children.length){
alert('Generate labels first')
return
}

const items = Array.from(labels.querySelectorAll('.label'))
const html = items.map(el => `<div class="label">${el.innerHTML}</div>`).join('')

const w = window.open('', '_blank', 'width=400,height=600')
w.document.write(`<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@page{size:6cm 6cm;margin:0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:white;}
.label{
width:6cm;height:6cm;
padding:3mm;
page-break-after:always;
break-after:page;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}
.label img{width:4.4cm;height:4.4cm;}
.bin{font-size:12pt;font-weight:bold;margin-top:1.5mm;}
.code{font-size:7pt;color:#666;margin-top:0.5mm;}
.scan{font-size:7pt;color:#444;margin-top:0.5mm;}
</style></head><body>
${html}
</body></html>`)
w.document.close()
w.focus()
w.onload = function(){ w.print() }
}

</script>

</body>
</html>
