<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>QR Label Generator</title>

<link rel="stylesheet" href="/css/style.css">

<style>

body{
font-family:Arial, sans-serif;
margin:30px;
background:#f5f5f5;
}

h1{
margin-bottom:10px;
}

.controls{
margin-bottom:25px;
}

button{
padding:10px 18px;
font-size:16px;
margin-right:10px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.label{

background:white;
border:1px dashed #bbb;
border-radius:10px;

padding:15px;
text-align:center;

}

.label img{
width:160px;
height:160px;
}

.bin{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.code{
font-size:14px;
color:#666;
margin-top:4px;
}

.scan{
font-size:13px;
margin-top:6px;
color:#444;
}

#status{
margin-top:10px;
color:#666;
}

/* Print optimization */

@media print{

body{
background:white;
margin:0;
}

.controls{
display:none;
}

.grid{
gap:10px;
}

.label{
border:none;
page-break-inside:avoid;
}

}

</style>

</head>

<body>

    <div id="navbar"></div>

<script>

fetch("/components/navbar.html")
.then(r=>r.text())
.then(html=>{
document.getElementById("navbar").innerHTML = html
if(window.markActiveNav) window.markActiveNav()
else setTimeout(()=>{ if(window.markActiveNav) window.markActiveNav() },200)
    if(window.adjustNavbarAuth) window.adjustNavbarAuth()
    else setTimeout(()=>{ if(window.adjustNavbarAuth) window.adjustNavbarAuth() },200)
})

</script>

<script src="/js/site.js"></script>

<h1>QR Label Generator</h1>

<div class="controls">

<button onclick="generate()">Generate All 55</button>

<button onclick="window.print()">Print</button>

<span id="status"></span>

</div>

<div id="labels" class="grid"></div>

<script>

async function generate(){

const container = document.getElementById("labels")
const status = document.getElementById("status")

container.innerHTML=""
status.innerText="Generating QR labels..."

try{

/* generate all QR codes in parallel for speed */

const requests=[]

for(let i=1;i<=55;i++){
requests.push(fetch("/api/qr/"+i).then(r=>r.json()))
}

const results = await Promise.all(requests)

results.forEach((data,index)=>{

const bin=index+1

const div=document.createElement("div")
div.className="label"

div.innerHTML=`
<img src="${data.qr}">
<div class="bin">BIN ${bin}</div>
<div class="code">Code: B${bin}</div>
<div class="scan">Scan when emptied</div>
`

container.appendChild(div)

})

status.innerText="QR labels ready"

}catch(err){

status.innerText="Error generating QR codes"
console.error(err)

}

}

</script>

</body>
</html>
