<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bin Usage Report</title>

    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/map.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/heatmapjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
      body {
        margin: 0;
        background: #eef2f6;
        color: #1e2a35;
      }

      .page {
        max-width: 1200px;
        margin: 24px auto 36px;
        padding: 0 16px;
      }

      .card {
        background: #fff;
        border: 1px solid #d7dee6;
        border-radius: 12px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.07);
        padding: 18px;
      }

      .section-title {
        margin: 0;
        font-size: 20px;
      }

      .section-note {
        margin: 6px 0 0;
        color: #566678;
        font-size: 14px;
      }

      .title-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
      }

      h1 {
        margin: 10px 0 2px;
        font-size: 28px;
      }

      .meta {
        color: #4d5c6b;
        font-size: 14px;
      }

      .meta-strong {
        color: #1f3b57;
        font-size: 14px;
        font-weight: 700;
      }

      .toolbar {
        margin: 14px 0 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        padding: 8px 12px;
        border: 1px solid #1b5fa8;
        background: #1f6fc2;
        color: #fff;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        background: #19599d;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: 14px;
      }

      .panel {
        border: 1px solid #dfe6ee;
        border-radius: 10px;
        padding: 12px;
        background: #fdfefe;
      }

      .panel h3 {
        margin: 0 0 8px;
      }

      .chart-wrap {
        height: 340px;
        min-height: 340px;
        display: flex;
        flex-direction: column;
      }

      .chart-wrap canvas {
        flex: 1;
        min-height: 0;
        width: 100% !important;
      }

      .map-container {
        margin-top: 14px;
        position: relative;
        overflow: hidden;
        display: block;
        width: 100%;
        border: 1px solid #dfe6ee;
        border-radius: 10px;
      }

      .map-container img {
        display: block;
        width: 100%;
        height: auto;
        position: relative;
        z-index: 1;
      }

      #heatLayer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 2;
        pointer-events: none;
      }

      #markerLayer {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 3;
        pointer-events: none;
      }

      .bin-marker {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #d62828;
        transform: translate(-50%, -50%);
        border: 1px solid #fff;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.25);
        z-index: 3;
      }

      .bin-marker-label {
        position: absolute;
        font-size: 11px;
        font-weight: 700;
        line-height: 1;
        color: #991b1b;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid rgba(153, 27, 27, 0.35);
        border-radius: 4px;
        padding: 2px 4px;
        white-space: nowrap;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
        z-index: 5;
      }

      #heatLayer canvas {
        position: absolute !important;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
      }

      .legend {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #2f3d4c;
      }

      .legend-bar {
        width: 160px;
        height: 12px;
        border-radius: 6px;
        border: 1px solid #b8c3ce;
        background: linear-gradient(
          90deg,
          #2ecc71 0%,
          #f1c40f 50%,
          #e74c3c 100%
        );
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 0;
        font-size: 14px;
        background: #fff;
      }

      .table-wrap {
        margin-top: 10px;
        max-height: 430px;
        overflow: auto;
        border: 1px solid #e1e7ed;
        border-radius: 8px;
      }

      th,
      td {
        border: 1px solid #e1e7ed;
        padding: 8px;
        text-align: left;
        white-space: nowrap;
      }

      th {
        background: #f4f8fb;
        position: sticky;
        top: 0;
        z-index: 1;
      }

      .split-tables {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        margin-top: 14px;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .chart-wrap {
          height: 300px;
          min-height: 300px;
        }
      }

      @page {
        size: A4 portrait;
        margin: 10mm;
      }

      @media print {
        body {
          background: #fff;
        }

        .map-container {
          border: none;
          border-radius: 0;
          overflow: hidden;
          position: relative;
        }

        .map-container img {
          display: block;
          width: 100% !important;
          height: auto !important;
          position: relative;
          z-index: 1;
        }

        #heatLayer,
        #markerLayer {
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          right: 0 !important;
          bottom: 0 !important;
          width: 100% !important;
          height: 100% !important;
          background: transparent !important;
        }

        #heatLayer canvas {
          left: 0 !important;
          top: 0 !important;
          right: 0 !important;
          bottom: 0 !important;
          width: 100% !important;
          height: 100% !important;
          background: transparent !important;
          mix-blend-mode: multiply;
        }

        body.print-heatmap-only .title-row,
        body.print-heatmap-only .section-note,
        body.print-heatmap-only .grid,
        body.print-heatmap-only .split-tables {
          display: none !important;
        }

        body.print-heatmap-only .card {
          padding: 0;
        }

        body.print-heatmap-only #heatmapSection {
          display: block !important;
        }

        body.print-heatmap-only .map-container {
          margin-top: 0;
        }

        body.print-heatmap-only .legend {
          display: flex !important;
        }

        body.print-using-composite #map {
          display: none !important;
        }

        body.print-using-composite #printMapCompositeWrap {
          display: block !important;
          margin-top: 0;
          border: none;
        }

        body.print-using-composite #printMapComposite {
          display: block !important;
          width: 100% !important;
          height: auto !important;
        }

        .grid {
          grid-template-columns: 1fr 1fr !important;
          gap: 10px;
        }

        .chart-wrap {
          height: 260px;
          min-height: 260px;
        }

        .page {
          max-width: none;
          margin: 0;
          padding: 0;
        }

        .card {
          border: none;
          box-shadow: none;
          padding: 0;
        }

        #navbar,
        .toolbar {
          display: none;
        }

        .chart-wrap,
        .map-container,
        table {
          break-inside: avoid;
          page-break-inside: avoid;
        }

        .table-wrap {
          max-height: none;
          overflow: visible;
          border: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="navbar"></div>

    <main class="page">
      <section class="card">
        <div class="title-row">
          <h1>Bin Usage Report</h1>
          <div
            style="
              display: flex;
              gap: 12px;
              align-items: center;
              flex-wrap: wrap;
            "
          >
            <p class="meta" id="reportMeta"></p>
            <p class="meta-strong" id="usedBinsMeta">Used bins: 0/55</p>
          </div>
        </div>
        <p class="section-note">
          Analytics summary for emptied bins, activity share, and full emptying
          history.
        </p>

        <div class="toolbar">
          <button type="button" id="refreshBtn">Refresh data</button>
          <button type="button" id="excelBtn">Download Excel</button>
          <button type="button" id="csvBtn">Download CSV</button>
          <button type="button" id="printBtn">Print report</button>
          <button type="button" id="printHeatmapBtn">Print heatmap only</button>
        </div>

        <div class="grid">
          <div class="panel chart-wrap">
            <h3>Empties Per Bin</h3>
            <canvas id="barChart"></canvas>
          </div>
          <div class="panel chart-wrap">
            <h3>Usage Share (Top 10)</h3>
            <canvas id="pieChart"></canvas>
          </div>
        </div>

        <div id="heatmapSection">
          <h3 style="margin: 16px 0 0">Heatmap</h3>
          <div class="map-container" id="map">
            <img src="/map/pohjakartta.png" alt="Event map" />
            <div id="heatLayer"></div>
            <div id="markerLayer"></div>
          </div>
          <div id="printMapCompositeWrap" style="display: none">
            <img id="printMapComposite" alt="Heatmap print composite" />
          </div>
          <div class="legend">
            <span>Low use</span>
            <span class="legend-bar" aria-hidden="true"></span>
            <span>High use</span>
          </div>
        </div>

        <div class="split-tables">
          <div>
            <h3 style="margin: 0">Bin Usage Table</h3>
            <div class="table-wrap">
              <table id="usageTable">
                <thead>
                  <tr>
                    <th>Bin ID</th>
                    <th>Total Empties</th>
                  </tr>
                </thead>
                <tbody id="usageTableBody">
                  <tr>
                    <td colspan="2">Loading...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <div>
            <h3 style="margin: 0">Emptying History (All Events)</h3>
            <div class="table-wrap">
              <table id="historyTable">
                <thead>
                  <tr>
                    <th>Log ID</th>
                    <th>Bin ID</th>
                    <th>Emptied At</th>
                  </tr>
                </thead>
                <tbody id="historyTableBody">
                  <tr>
                    <td colspan="3">Loading...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/js/site.js"></script>
    <script src="/js/report.js"></script>
  </body>
</html>
